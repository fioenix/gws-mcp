name: Feature request
description: A capability you wish gws-mcp had.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: search existing issues to avoid duplicates.
        Keep proposals concrete — describe the agent workflow you are trying to enable.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: The agent workflow you want to enable, and what is awkward today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed interface
      description: A concrete sketch — tool name, arguments, expected output.
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you weighed, and why this one wins.

  - type: textarea
    id: scope
    attributes:
      label: Scope / out-of-scope
      description: What you are explicitly not asking for. Helps reviewers gauge churn.
